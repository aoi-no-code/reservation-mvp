# Salon Board ログイン（macOS ランナー版）— 出口IPが変わるため ubuntu で届かない場合の代替
# Secrets: SALONBOARD_ID, SALONBOARD_PASSWORD（Repository secrets）
name: salonboard-login-macos

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify Actions secrets
        env:
          SALONBOARD_ID: ${{ secrets.SALONBOARD_ID }}
          SALONBOARD_PASSWORD: ${{ secrets.SALONBOARD_PASSWORD }}
        run: |
          if [ -z "${SALONBOARD_ID}" ] || [ -z "${SALONBOARD_PASSWORD}" ]; then
            echo "::error::Repository secrets に SALONBOARD_ID / SALONBOARD_PASSWORD が未設定、または空です。"
            exit 1
          fi
          echo "SALONBOARD_ID / SALONBOARD_PASSWORD は設定済み（値は表示しません）。"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (macOS)
        run: npx playwright install chromium

      - name: Login (headless, force fresh context)
        env:
          SALONBOARD_ID: ${{ secrets.SALONBOARD_ID }}
          SALONBOARD_PASSWORD: ${{ secrets.SALONBOARD_PASSWORD }}
          SALONBOARD_HEADLESS: "1"
          SALONBOARD_FORCE_LOGIN: "1"
          SALONBOARD_MANUAL_WAIT_MS: "8000"
          SALONBOARD_NET_PREFLIGHT_MS: "60000"
          SALONBOARD_GOTO_TIMEOUT_MS: "45000"
          SALONBOARD_GOTO_RETRY_TIMEOUT_MS: "25000"
          SALONBOARD_GOTO_WAIT_UNTIL: "commit"
          SALONBOARD_GOTO_RETRIES: "2"
        run: npm run sb:login

      - name: Upload debug screenshots (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salonboard-login-macos-screenshots
          path: tmp/
          if-no-files-found: ignore
