# Salon Board へ毎回フルログイン（GitHub Actions 用）
# リポジトリの Settings → Secrets and variables → Actions に次を登録:
#   SALONBOARD_ID
#   SALONBOARD_PASSWORD
#
# 手動実行: Actions タブ → 本ワークフロー → Run workflow
name: salonboard-login

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium + OS deps
        run: npx playwright install --with-deps chromium

      - name: Login (headless, force fresh context)
        env:
          SALONBOARD_ID: ${{ secrets.SALONBOARD_ID }}
          SALONBOARD_PASSWORD: ${{ secrets.SALONBOARD_PASSWORD }}
          SALONBOARD_HEADLESS: "1"
          SALONBOARD_FORCE_LOGIN: "1"
          # CI では手動 CAPTCHA 待ちを短く（必要なら値を上げる）
          SALONBOARD_MANUAL_WAIT_MS: "8000"
        run: npm run sb:login
