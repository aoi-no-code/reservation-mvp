# Salon Board へ毎回フルログイン（GitHub Actions 用）
# リポジトリの Settings → Secrets and variables → Actions に次を登録:
#   SALONBOARD_ID
#   SALONBOARD_PASSWORD
#
# 手動実行: Actions タブ → 本ワークフロー → Run workflow
name: salonboard-login

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify Actions secrets
        env:
          SALONBOARD_ID: ${{ secrets.SALONBOARD_ID }}
          SALONBOARD_PASSWORD: ${{ secrets.SALONBOARD_PASSWORD }}
        run: |
          if [ -z "${SALONBOARD_ID}" ] || [ -z "${SALONBOARD_PASSWORD}" ]; then
            echo "::error::Repository secrets に SALONBOARD_ID / SALONBOARD_PASSWORD が未設定、または空です。"
            exit 1
          fi
          echo "SALONBOARD_ID / SALONBOARD_PASSWORD は設定済み（値は表示しません）。"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium + OS deps
        run: npx playwright install --with-deps chromium

      - name: Login (headless, force fresh context)
        env:
          SALONBOARD_ID: ${{ secrets.SALONBOARD_ID }}
          SALONBOARD_PASSWORD: ${{ secrets.SALONBOARD_PASSWORD }}
          SALONBOARD_HEADLESS: "1"
          SALONBOARD_FORCE_LOGIN: "1"
          # CI では手動 CAPTCHA 待ちを短く（必要なら値を上げる）
          SALONBOARD_MANUAL_WAIT_MS: "8000"
          # Actions ランナーは遅延・遮断がありやすいので長め＋リトライ
          SALONBOARD_GOTO_TIMEOUT_MS: "120000"
          SALONBOARD_GOTO_WAIT_UNTIL: "commit"
          SALONBOARD_GOTO_RETRIES: "4"
        run: npm run sb:login

      - name: Upload debug screenshots (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salonboard-login-screenshots
          path: tmp/
          if-no-files-found: ignore
